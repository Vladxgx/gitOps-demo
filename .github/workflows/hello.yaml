name: hello-actions

on:
  push:

jobs:
  
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Mock Docker build
        run: |
          echo "docker build"

      - name: Slack - Docker build
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "Docker build done"
          SLACK_TITLE: "GitHub Actions"
          
      docker-push:
        runs-om: ubuntu-latest
        needs: docker-build
        steps:
          - name: Docker push
            run: echo "docker push"

          - name: Slack Docker push
            uses: rtCamp/action-slack-notify@v2
            env:
              SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
              SLACK_MESSAGE: "Docker image pushed"
              SLACK_TITLE: "GitHub Actions"

          helm-template:
            runs-on: ubuntu-latest
            needs: docker-push
            steps:
              - name: Helm template
                run: echo "helm template..."

              - name: Slack helm
                uses: rtCamp/action-slack-notify@v2
                env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                  SLACK_MESSAGE: "Helm template generated"
                  SLACK_TITLE: "GitHub Actions"
 
            gitops-push:
              runs-on: ubuntu-latest
              needs: helm-template
              steps:
              - name: GitOps repo push
                run: |
                  echo "git clone gitops repo"
                  echo "copy rendered manifests"
                  echo "git add ."
                  echo "git commit -m 'Update demo-app image tag'"
                  echo "git push origin main"

              - name: Slack - GitOps push
                uses: rtCamp/action-slack-notify@v2
                env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
                  SLACK_MESSAGE: "GitOps repository updated"
                  SLACK_TITLE: "GitHub Actions"
                 
 
