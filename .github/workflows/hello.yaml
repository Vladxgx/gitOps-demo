name: hello-actions

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: echo "Hello GitHub Actions"
   
  build:
    runs-on: ubuntu-latest
    needs: hello
    steps:
      - name: build something
        run: echo "build the hello"

  market:
    runs-on: ubuntu-latest
    steps:
      - name: hello JS
        uses: actions/hello-world-javascript-action@main
        with:
          who-to-greet: Vlad
